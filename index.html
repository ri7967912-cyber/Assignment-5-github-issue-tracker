<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- Tailwind css -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


     <!-- Challenges: Border Colors  -->
     <style>
        .card-open { border-top: 5px solid #00A96E; }
        .card-closed { border-top: 5px solid #4A00FF; }
        .active-tab { background-color: #4A00FF !important; color: white; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md text-center">
        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="Logo" class="w-16 mx-auto mb-4">
        <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
        <p class="text-gray-500 mb-6">Sign in to manage your issues</p>

        <form id="loginForm" class="text-left">
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">Username</label>
                <input type="text" id="username" placeholder="Enter Username" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-purple-600">
                <p class="text-blue-500 text-xs mt-1">Default: admin</p>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold mb-1">Password</label>
                <input type="password" id="password" placeholder="Enter Password" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-purple-600">
                <p class="text-blue-500 text-xs mt-1">Default: admin123</p>
            </div>
            <button type="submit" class="w-full bg-[#4A00FF] text-white py-2 rounded font-bold hover:bg-purple-700 transition">Sign In</button>
        </form>

        <div class="mt-6 text-gray-400 text-sm italic">
            OR <br> Demo Credentials: <br>
            <span class="font-mono text-gray-600">Username: admin / Password: admin123</span>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
