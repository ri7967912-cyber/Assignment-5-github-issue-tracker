<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues · Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-[#E4E4E7]">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-[#0A0A0A] tracking-tight">GitHub Issues Tracker</h1>
      <p class="text-[#64748B] mt-2 text-sm">Sign in to manage your issues</p>
    </div>
    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-[#1E293B] mb-1">Username</label>
        <input type="text" id="username" class="w-full px-4 py-2 border border-[#E4E4E7] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4A0FF0] bg-white text-sm" placeholder="Enter Username">
      </div>
      <div>
        <label class="block text-sm font-medium text-[#1E293B] mb-1">Password</label>
        <input type="password" id="password" class="w-full px-4 py-2 border border-[#E4E4E7] rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4A0FF0] bg-white text-sm" placeholder="••••••••">
        <p class="text-xs text-[#64748B] mt-1">Default: admin123</p>
      </div>
      <button id="signInBtn" class="w-full bg-[#4A0FF0] hover:bg-[#3a0cc0] text-white font-medium py-2.5 rounded-lg transition">Sign In</button>
      <div class="relative flex py-3 items-center">
        <div class="flex-grow border-t border-[#E4E4E7]"></div>
        <span class="flex-shrink mx-3 text-xs text-[#64748B]">OR</span>
        <div class="flex-grow border-t border-[#E4E4E7]"></div>
      </div>
      <div class="bg-[#F8FAFC] rounded-lg p-4 text-sm text-[#1E293B] space-y-1 border border-[#E4E4E7]">
        <p class="font-medium">Demo Credentials:</p>
        <p>Username: <span class="font-mono">admin</span></p>
        <p>Password: <span class="font-mono">admin123</span></p>
        <p class="text-xs text-[#64748B] mt-1">(type them above to sign in)</p>
      </div>
    </div>
  </div>
  <script src="./script/login.js"></script>
</body>
</html>
