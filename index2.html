<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker  Dashboard</title>
    <!-- tailwind css -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


      <!-- Challenges: Border Colors  -->
    <style>
        .card-open { border-top: 5px solid #00A96E; }
        .card-closed { border-top: 5px solid #4A00FF; }
        .active-tab { background-color: #4A00FF !important; color: white; }
    </style>
</head>
<body class="bg-[#F8FAFC]">

    <nav class="bg-white border-b p-4 flex justify-between items-center px-10">
        <div class="font-bold text-lg flex items-center gap-2">
             <span>GitHub Issues Tracker</span>
        </div>
        <div class="flex gap-2">
            <input type="text" id="searchInput" placeholder="Search issues..." class="border rounded px-3 py-1 outline-none">
            <button onclick="handleSearch()" class="bg-[#4A00FF] text-white px-4 py-1 rounded">Search</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <div class="flex gap-2 mb-6">
            <button onclick="loadIssues('all')" class="px-6 py-2 bg-white border rounded active-tab">All</button>
            <button onclick="loadIssues('open')" class="px-6 py-2 bg-white border rounded">Open</button>
            <button onclick="loadIssues('closed')" class="px-6 py-2 bg-white border rounded">Closed</button>
        </div>

        <div class="flex justify-between items-center bg-white p-4 border rounded-t-lg">
            <div class="flex items-center gap-2">
                <span class="font-bold" id="issueCount">0 Issues</span>
            </div>
            <div class="flex gap-4 text-sm font-medium">
                <span class="text-green-600">● Open</span>
                <span class="text-purple-600">● Closed</span>
            </div>
        </div>

        <div id="loadingSpinner" class="hidden text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-purple-600 mx-auto"></div>
        </div>

        <div id="issueGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-4">
            </div>
    </main>

    <div id="issueModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg w-11/12 max-w-2xl p-6 relative">
            <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
            <div id="modalStatus" class="mb-4"></div>
            <p id="modalDesc" class="text-gray-600 mb-6 border-b pb-4"></p>
            <div class="grid grid-cols-2 gap-4">
                <div><strong>Assignee:</strong> <p id="modalAuthor"></p></div>
                <div><strong>Priority:</strong> <p id="modalPriority"></p></div>
            </div>
            <button onclick="closeModal()" class="mt-6 bg-[#4A00FF] text-white px-6 py-2 rounded float-right">Close</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
